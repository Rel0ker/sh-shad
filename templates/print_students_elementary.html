<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>{{ print_badge }} — {{ date_display }}</title>
  <link rel="stylesheet" href="{{ css_url }}">
</head>
<body class="page-print print-students print-elementary">
  <div id="print-area" class="print-sheet print-students">
    <div class="print-head">
      <div class="print-head-left">
        <div class="print-badge print-badge-elementary">{{ print_badge }}</div>
        <h1 class="print-title">Изменения в расписании</h1>
        <p class="print-subtitle">{{ date_display }}</p>
      </div>
    </div>
    <table class="print-table print-table-students">
      <thead>
        <tr>
          <th>Класс</th>
          <th>№ урока</th>
          <th>Урок</th>
          <th>Кабинет</th>
          <th>Примечание</th>
        </tr>
      </thead>
      <tbody>
        {% for row in rows %}
        <tr>
          <td>{{ row.klass }}</td>
          <td class="num">{{ row.lesson_no }}</td>
          <td>{{ row.subject }}</td>
          <td>{{ row.room }}</td>
          <td>{{ row.note }}</td>
        </tr>
        {% else %}
        <tr><td colspan="5" class="empty">Нет изменений для отображения</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
